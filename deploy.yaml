# Railway deployment map for this monorepo.
#
# Railway does not automatically create a whole project from this file.
# Create these services in Railway, then set each service's root directory
# and config-as-code path as shown below.

project: crypto-trading

databases:
  postgres:
    railwayTemplate: PostgreSQL
    requiredBy:
      - backend
      - worker
  redis:
    railwayTemplate: Redis
    requiredBy:
      - backend
      - worker

services:
  backend:
    type: web
    rootDirectory: /backend
    configPath: /backend/railway.json
    variables:
      DATABASE_URL: ${{Postgres.DATABASE_URL}}
      REDIS_HOST: ${{Redis.REDISHOST}}
      REDIS_PORT: ${{Redis.REDISPORT}}
      REDIS_PASSWORD: ${{Redis.REDISPASSWORD}}
      JWT_SECRET: generate-a-long-random-secret
      CORS_ORIGINS: https://${{frontend.RAILWAY_PUBLIC_DOMAIN}}
      BINANCE_WS_URL: wss://stream.binance.com:9443
      MARKET_UNIVERSE_REFRESH_MS: "300000"

  worker:
    type: worker
    rootDirectory: /backend
    configPath: /backend/railway.worker.json
    variables:
      DATABASE_URL: ${{Postgres.DATABASE_URL}}
      REDIS_HOST: ${{Redis.REDISHOST}}
      REDIS_PORT: ${{Redis.REDISPORT}}
      REDIS_PASSWORD: ${{Redis.REDISPASSWORD}}
      JWT_SECRET: ${{backend.JWT_SECRET}}

  frontend:
    type: web
    rootDirectory: /frontend2
    configPath: /frontend2/railway.json
    variables:
      NEXT_PUBLIC_API_URL: https://${{backend.RAILWAY_PUBLIC_DOMAIN}}
      NEXT_PUBLIC_SOCKET_URL: https://${{backend.RAILWAY_PUBLIC_DOMAIN}}
      NEXT_PUBLIC_GRAPHQL_HTTP_URL: https://${{backend.RAILWAY_PUBLIC_DOMAIN}}/graphql
      NEXT_PUBLIC_GRAPHQL_WS_URL: wss://${{backend.RAILWAY_PUBLIC_DOMAIN}}/graphql
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: optional-google-client-id
      NEXT_PUBLIC_TOKEN_TREASURY_ADDRESS: optional-token-treasury-address
